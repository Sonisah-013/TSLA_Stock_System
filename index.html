<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TSLA Stock Prediction</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
</head>
<body>
    <div class="container mt-5">
        <h2 class="mb-4 text-center">TSLA Stock Price Prediction 🚀</h2>

        <form id="predictForm">
            <div class="mb-3">
                <label for="open" class="form-label">Open Price</label>
                <input type="number" step="0.01" class="form-control" id="open" required>
            </div>
            <div class="mb-3">
                <label for="high" class="form-label">High Price</label>
                <input type="number" step="0.01" class="form-control" id="high" required>
            </div>
            <div class="mb-3">
                <label for="low" class="form-label">Low Price</label>
                <input type="number" step="0.01" class="form-control" id="low" required>
            </div>
            <div class="mb-3">
                <label for="volume" class="form-label">Volume</label>
                <input type="number" class="form-control" id="volume" required>
            </div>
            <button type="submit" class="btn btn-primary">Predict Close Price</button>
        </form>

        <div class="mt-4">
            <h4>Predicted Close Price: <span id="result">-</span></h4>
        </div>
    </div>

    <script>
        const form = document.getElementById("predictForm");
        form.addEventListener("submit", async (e) => {
            e.preventDefault();

            const data = {
                open: parseFloat(document.getElementById("open").value),
                high: parseFloat(document.getElementById("high").value),
                low: parseFloat(document.getElementById("low").value),
                volume: parseFloat(document.getElementById("volume").value)
            };

            const response = await fetch("/predict", {
                method: "POST",
                headers: {"Content-Type": "application/json"},
                body: JSON.stringify(data)
            });

            const result = await response.json();
            document.getElementById("result").innerText = result.predicted_close;
        });
    </script>
</body>
</html>
